name: Monthly Data Update

on:
  # Run automatically on the 1st of every month at 07:00 Israel time (= 05:00 UTC)
  schedule:
    - cron: '0 5 1 * *'

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit & push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright pandas openpyxl
          playwright install chromium
          playwright install-deps chromium

      - name: Download latest data from Chamber of Commerce
        run: python scripts/download_data.py
        continue-on-error: true

      - name: Upload debug screenshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshot
          path: scripts/debug_screenshot.png
          if-no-files-found: ignore

      - name: Commit and push if file changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/*.xlsx
          if git diff --staged --quiet; then
            echo "No changes — data is already up to date."
          else
            git commit -m "Auto-update: CE registration data $(date +'%Y-%m')"
            git push
            echo "Pushed updated data to main."
          fi
